<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMO Delegate Submission Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>

    body { background: #f4f1ea; color: #1a2332; font-family: 'Lora', Georgia, serif; min-height: 100vh; }

    .app { min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a2332; color: #f4f1ea; border-bottom: 3px solid #c9a961; }
    .header-inner { max-width: 1000px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }

    .header-anchor { color: #c9a961; font-size: 1.8rem; line-height: 1; }
    .header-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: #c9a961; margin-bottom: 0.15rem; }
    .header-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500; line-height: 1.1; }
    .header-title em { color: #c9a961; font-size: 1rem; font-style: normal; }
    .user-pill { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; background: rgba(201,169,97,0.15); color: #c9a961; border: 1px solid rgba(201,169,97,0.3); padding: 0.3rem 0.75rem; }
    .session-pill { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(255,255,255,0.06); color: #f4f1ea; border: 1px solid rgba(255,255,255,0.15); padding: 0.3rem 0.75rem; }

    .btn { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.5rem 1rem; cursor: pointer; border: none; transition: background 0.15s; }
    .btn-nav { background: transparent; color: #c9a961; border: 1px solid rgba(201,169,97,0.35); }
    .btn-nav:hover { background: rgba(201,169,97,0.1); }
    .btn-primary { background: #c9a961; color: #1a2332; }
    .btn-primary:hover { background: #b8964e; }
    .btn-ghost { background: transparent; color: #f4f1ea; border: 1px solid rgba(255,255,255,0.2); }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); }
    .btn-danger { background: transparent; color: #8b3a3a; border: 1px solid rgba(139,58,58,0.35); }

    main { flex: 1; max-width: 1000px; margin: 0 auto; width: 100%; padding: 2rem; }

    .login-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; background: #1a2332; }
    .login-card { background: #f4f1ea; width: 100%; max-width: 720px; }
    .login-header { padding: 2rem 2.5rem 1.5rem; border-bottom: 1px solid rgba(26,35,50,0.1); }
    .login-body { padding: 2rem 2.5rem; position: relative; }
    .login-search { width: 100%; border: 1px solid rgba(26,35,50,0.25); background: #fffbf2; padding: 0.6rem 0.9rem; font-family: 'Lora', serif; font-size: 0.95rem; color: #1a2332; margin-bottom: 1.25rem; outline: none; }

    .names-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.4rem; }
    .name-btn { background: #fffbf2; border: 1px solid rgba(26,35,50,0.15); padding: 0.6rem 0.9rem; text-align: left; cursor: pointer; font-family: 'Lora', serif; font-size: 0.9rem; color: #1a2332; transition: all 0.12s; }
    .name-btn:hover { background: #1a2332; color: #f4f1ea; border-color: #1a2332; }
    .names-section-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #5a6478; margin: 1rem 0 0.5rem; }
    .names-section-label:first-child { margin-top: 0; }
    .names-scroll { max-height: 420px; overflow-y: auto; }

    .session-banner { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; padding: 0.6rem 0.9rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .session-banner.active { background: rgba(158,207,158,0.15); border: 1px solid rgba(158,207,158,0.4); color: #3a6b3a; }
    .session-banner.waiting { background: rgba(201,169,97,0.12); border: 1px solid rgba(201,169,97,0.35); color: #8b7346; }
    .names-disabled { opacity: 0.4; pointer-events: none; filter: grayscale(0.4); }

    .role-login-row { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(26,35,50,0.1); display: flex; justify-content: center; gap: 0.6rem; flex-wrap: wrap; }
    .role-btn { border-color: rgba(26,35,50,0.2); color: #5a6478; }

    .modal-backdrop { position: fixed; inset: 0; z-index: 100; background: rgba(26,35,50,0.75); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; padding: 1.5rem; overflow-y: auto; }
    .pw-modal { background: #fffbf2; width: 100%; max-width: 440px; box-shadow: 0 30px 80px rgba(0,0,0,0.5); margin: auto; }
    .pw-header { background: #1a2332; color: #f4f1ea; padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .pw-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a961; margin-bottom: 0.2rem; }
    .pw-title { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 500; }
    .pw-body { padding: 1.5rem; }
    .pw-text { font-size: 0.9rem; line-height: 1.55; color: #1a2332; margin-bottom: 1rem; }
    .pin-input-row { display: flex; gap: 0.6rem; justify-content: center; margin-bottom: 1rem; }
    .pin-digit { width: 48px; height: 58px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; border: 1px solid rgba(26,35,50,0.25); background: #fffbf2; outline: none; }
    .pin-digit:focus { border-color: #c9a961; }
    .pw-error { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #8b3a3a; margin-top: 0.4rem; text-align: center; }
    .pw-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem; }
    .modal-close { color: rgba(244,241,234,0.7); cursor: pointer; font-size: 1.2rem; background: none; border: none; line-height: 1; }
    .modal-close:hover { color: #f4f1ea; }

    .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(26,35,50,0.15); flex-wrap: wrap; gap: 0.75rem; }
    .dash-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 500; }
    .dash-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #5a6478; letter-spacing: 0.1em; margin-top: 0.2rem; }
    .dash-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .empty { border: 2px dashed rgba(26,35,50,0.2); padding: 3rem 2rem; text-align: center; margin-bottom: 1.5rem; }
    .empty-icon { font-size: 2.5rem; opacity: 0.3; margin-bottom: 1rem; }
    .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 500; margin-bottom: 0.4rem; }
    .empty-sub { color: #5a6478; font-size: 0.9rem; }

    .group { margin-bottom: 1.75rem; }
    .group-header { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 0.6rem; padding-bottom: 0.35rem; border-bottom: 2px solid #1a2332; }

    /* Horizontal agenda item quick-jump nav */
    .agenda-nav { position: sticky; top: 0; z-index: 50; background: #f4f1ea; padding: 0.75rem 0; margin-bottom: 1rem; border-bottom: 1px solid rgba(26,35,50,0.15); display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
    .agenda-nav-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #5a6478; margin-right: 0.4rem; flex-shrink: 0; }
    .agenda-nav-item { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.65rem; background: #fffbf2; border: 1px solid rgba(26,35,50,0.2); color: #1a2332; cursor: pointer; transition: all 0.12s; }
    .agenda-nav-item:hover { background: #1a2332; color: #f4f1ea; border-color: #1a2332; }
    .group-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; }
    .group-count { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: #5a6478; letter-spacing: 0.12em; }

    .sub-card { background: #fffbf2; border: 1px solid rgba(26,35,50,0.15); padding: 1.1rem 1.3rem; margin-bottom: 0.6rem; position: relative; }
    .sub-card.completed { background: #fff0f3; border-color: rgba(210,100,130,0.35); }
    .sub-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.5rem; cursor: pointer; }
    .sub-card-subject { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; line-height: 1.3; }
    .sub-card.completed .sub-card-subject { text-decoration: line-through; color: #a03050; }
    .sub-card-delegation { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #1a2332; margin-bottom: 0.15rem; }
    .sub-card.completed .sub-card-delegation { color: #a03050; }
    .sub-card-subject-line { font-family: 'Lora', serif; font-size: 1rem; font-weight: 500; color: #1a2332; line-height: 1.3; }
    .sub-card.completed .sub-card-subject-line { text-decoration: line-through; color: #a03050; opacity: 0.75; }
    .sub-card-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: #5a6478; letter-spacing: 0.06em; margin-top: 0.3rem; }
    .status-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.15rem 0.5rem; border: 1px solid; flex-shrink: 0; }
    .status-submitted { border-color: rgba(122,180,212,0.5); color: #3a6b8b; background: rgba(122,180,212,0.1); }
    .status-amended { border-color: rgba(201,169,97,0.5); color: #8b7346; background: rgba(201,169,97,0.1); }
    .status-done { border-color: rgba(210,100,130,0.5); color: #a03050; background: rgba(210,100,130,0.1); }
    .sub-card-preview { font-size: 0.85rem; color: #5a6478; line-height: 1.5; margin-top: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; cursor: pointer; }
    .sub-card-actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .agenda-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.15rem 0.5rem; border: 1px solid rgba(201,169,97,0.5); color: #8b7346; background: rgba(201,169,97,0.1); margin-right: 0.3rem; cursor: pointer; }
    .agenda-tag:hover { background: rgba(201,169,97,0.25); }

    .form-card { background: #fffbf2; border: 1px solid rgba(26,35,50,0.15); padding: 1.75rem; }
    .form-field { margin-bottom: 1.25rem; }
    .form-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: #5a6478; margin-bottom: 0.4rem; display: block; }
    .form-input { width: 100%; border: 1px solid rgba(26,35,50,0.25); background: #fffbf2; padding: 0.6rem 0.8rem; font-family: 'Lora', serif; font-size: 0.95rem; color: #1a2332; outline: none; }
    .form-input:focus { border-color: #c9a961; }
    textarea.form-input { min-height: 220px; resize: vertical; font-family: 'Lora', serif; line-height: 1.6; }
    select.form-input { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .method-tabs { display: flex; background: #e8e3d6; padding: 2px; width: fit-content; margin-bottom: 1rem; }
    .method-tab { padding: 0.45rem 1.1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border: none; background: transparent; color: #1a2332; }
    .method-tab.active { background: #1a2332; color: #f4f1ea; }
    .file-drop { border: 2px dashed rgba(26,35,50,0.25); padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.15s; }
    .file-drop:hover, .file-drop.drag-over { border-color: #c9a961; background: rgba(201,169,97,0.05); }
    .file-drop-icon { font-size: 1.8rem; opacity: 0.4; margin-bottom: 0.5rem; }
    .file-name-chip { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(158,207,158,0.15); border: 1px solid rgba(158,207,158,0.4); padding: 0.4rem 0.8rem; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; margin-top: 0.75rem; }
    .form-actions { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid rgba(26,35,50,0.1); }

    .session-panel { background: #fffbf2; border: 1px solid rgba(26,35,50,0.15); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
    .session-panel-row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .session-current-name { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; }
    .new-session-inline { margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid rgba(26,35,50,0.1); display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem; align-items: end; }
    .new-session-inline .form-field { margin-bottom: 0; }
    .session-filter-select { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; padding: 0.4rem 0.6rem; border: 1px solid rgba(26,35,50,0.25); background: #fffbf2; }
    .session-list-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-top: 1px solid rgba(26,35,50,0.08); font-size: 0.85rem; }
    .session-list-row:first-of-type { border-top: none; }

    .roster-list { max-height: 280px; overflow-y: auto; margin: 1rem 0; }
    .roster-item { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(26,35,50,0.08); font-size: 0.9rem; }
    .roster-add-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .roster-add-row input { flex: 1; }

    /* Persistent notification tray (interpreter view) */
    .notif-btn { position: relative; background: transparent; border: 1px solid rgba(201,169,97,0.35); color: #c9a961; padding: 0.35rem 0.6rem; cursor: pointer; font-size: 1rem; line-height: 1; display: flex; align-items: center; gap: 0.4rem; }
    .notif-btn:hover { background: rgba(201,169,97,0.1); }
    .notif-badge { background: #c0392b; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; }
    .notif-tray { position: fixed; top: 0; right: 0; height: 100vh; width: 340px; background: #1a2332; z-index: 200; box-shadow: -8px 0 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; }
    .notif-tray.open { transform: translateX(0); }
    .notif-tray-header { padding: 1.25rem 1.25rem 1rem; border-bottom: 1px solid rgba(201,169,97,0.2); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .notif-tray-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 500; color: #f4f1ea; }
    .notif-tray-actions { display: flex; align-items: center; gap: 0.5rem; }
    .notif-clear-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: #c9a961; background: transparent; border: none; cursor: pointer; opacity: 0.7; }
    .notif-clear-btn:hover { opacity: 1; }
    .notif-close-btn { color: rgba(244,241,234,0.6); background: none; border: none; cursor: pointer; font-size: 1.1rem; line-height: 1; }
    .notif-close-btn:hover { color: #f4f1ea; }
    .notif-list { flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .notif-empty { color: rgba(244,241,234,0.35); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; text-align: center; margin-top: 2rem; }
    .notif-item { background: rgba(244,241,234,0.06); border-left: 3px solid #c9a961; padding: 0.75rem 1rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; }
    .notif-item-body { flex: 1; min-width: 0; }
    .notif-item-text { font-family: 'Lora', serif; font-size: 0.85rem; color: #f4f1ea; line-height: 1.4; }
    .notif-item-time { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: rgba(244,241,234,0.4); margin-top: 0.25rem; }
    .notif-item-dismiss { color: rgba(244,241,234,0.3); background: none; border: none; cursor: pointer; font-size: 0.9rem; flex-shrink: 0; padding: 0; line-height: 1; margin-top: 0.1rem; }
    .notif-item-dismiss:hover { color: rgba(244,241,234,0.8); }

    .toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { background: #1a2332; color: #f4f1ea; padding: 0.7rem 1.1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em; border-left: 3px solid #c9a961; max-width: 360px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); animation: slideIn 0.25s ease; }
    .toast.error { border-left-color: #c0392b; background: #8b3a3a; }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .reader-modal { background: #fffbf2; width: 100%; max-width: 1000px; height: 90vh; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 30px 80px rgba(0,0,0,0.5); margin: auto; }
    .reader-header { background: #1a2332; color: #f4f1ea; padding: 1.25rem 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-shrink: 0; }
    .reader-subject { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500; line-height: 1.25; }
    .reader-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: rgba(244,241,234,0.6); margin-top: 0.35rem; }
    .reader-body { padding: 2rem 2.5rem; overflow-y: auto; flex: 1; font-size: 1.05rem; line-height: 1.8; white-space: pre-wrap; font-family: 'Lora', serif; color: #1a2332; overscroll-behavior: contain; max-width: 780px; margin: 0 auto; width: 100%; }

    .loading { display: flex; align-items: center; justify-content: center; padding: 4rem; gap: 0.75rem; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: #5a6478; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(26,35,50,0.15); border-top-color: #c9a961; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .header-inner { padding: 0.75rem 1rem; }
      main { padding: 1rem; }
      .names-grid { grid-template-columns: 1fr 1fr; }
      .new-session-inline { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app" id="app"><div class="loading"><div class="spinner"></div> Loading…</div></div>
<div class="toast-container" id="toasts"></div>
<div class="notif-tray" id="notif-tray">
  <div class="notif-tray-header">
    <div class="notif-tray-title">Notifications</div>
    <div class="notif-tray-actions">
      <button class="notif-clear-btn" id="notif-clear-all">Clear all</button>
      <button class="notif-close-btn" id="notif-tray-close">✕</button>
    </div>
  </div>
  <div class="notif-list" id="notif-list">
    <div class="notif-empty">No notifications</div>
  </div>
</div>

<script>

function parseAgenda(val) {
  if (!val) return [];
  return String(val).split(',').map(s => s.trim()).filter(Boolean);
}
function formatAgenda(arr) { return [...new Set(arr.filter(Boolean))].join(','); }
function agendaLabel(val) {
  const items = parseAgenda(val);
  return items.length ? items.map(i => 'Item ' + i).join(', ') : '';
}
function parseCompletedItems(val) {
  if (!val) return [];
  return String(val).split(',').map(s => s.trim()).filter(Boolean);
}
function formatCompletedItems(arr) { return [...new Set(arr.filter(Boolean))].join(','); }
function isItemDone(stmt, itemContext) {
  const completed = parseCompletedItems(stmt.completed_items);
  const allItems = parseAgenda(stmt.agenda_item);
  if (itemContext) return completed.includes(itemContext);
  if (allItems.length === 0) return completed.includes('*');
  return allItems.length > 0 && allItems.every(i => completed.includes(i));
}
function toggleItemDone(stmt, itemContext) {
  let completed = parseCompletedItems(stmt.completed_items);
  const allItems = parseAgenda(stmt.agenda_item);
  const currentlyDone = isItemDone(stmt, itemContext);
  if (itemContext) {
    completed = currentlyDone ? completed.filter(i => i !== itemContext) : completed.concat([itemContext]);
  } else if (allItems.length === 0) {
    completed = currentlyDone ? completed.filter(i => i !== '*') : completed.concat(['*']);
  } else {
    completed = currentlyDone ? [] : allItems.slice();
  }
  return formatCompletedItems(completed);
}

function showToast(msg, isError) {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(function() { el.style.opacity = '0'; }, 3500);
  setTimeout(function() { el.remove(); }, 3900);
}

// Persistent notification tray — stays until dismissed, unlike showToast above
// (which is only for transient errors/confirmations).
function addNotification(text, submissionId) {
  const notif = { id: 'n_' + Date.now() + '_' + Math.random().toString(36).slice(2,5), text: text, time: Date.now(), submissionId: submissionId || null };
  state.notifications = [notif].concat(state.notifications);
  updateNotifUI();
  const unread = state.notifications.length;
  if (!document.hidden && unread > 0) document.title = '(' + unread + ') IMO Delegate Portal';
  if (document.hidden && typeof Notification !== 'undefined' && Notification.permission === 'granted') {
    new Notification('IMO Delegate Portal', { body: text });
  }
}

function updateNotifUI() {
  const tray = document.getElementById('notif-tray');
  const list = document.getElementById('notif-list');
  const badge = document.getElementById('notif-badge');
  const count = state.notifications.length;

  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'inline-flex' : 'none';
  }
  document.title = count > 0 ? '(' + count + ') IMO Delegate Portal' : 'IMO Delegate Portal';
  if (tray) tray.classList.toggle('open', state.trayOpen);

  if (list) {
    if (count === 0) {
      list.innerHTML = '<div class="notif-empty">No notifications</div>';
    } else {
      list.innerHTML = state.notifications.map(function(n) {
        return '<div class="notif-item" id="notif-' + n.id + '" data-notif-open="' + n.id + '" style="' + (n.submissionId ? 'cursor:pointer;' : '') + '">' +
          '<div class="notif-item-body"><div class="notif-item-text">' + esc(n.text) + '</div><div class="notif-item-time">' + new Date(n.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) + '</div></div>' +
          '<button class="notif-item-dismiss" data-notif-id="' + n.id + '" title="Dismiss">✕</button></div>';
      }).join('');
      list.querySelectorAll('[data-notif-id]').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          state.notifications = state.notifications.filter(function(n) { return n.id !== btn.dataset.notifId; });
          updateNotifUI();
        });
      });
      list.querySelectorAll('[data-notif-open]').forEach(function(el) {
        el.addEventListener('click', function() {
          const n = state.notifications.find(function(x){ return x.id === el.dataset.notifOpen; });
          if (!n || !n.submissionId) return;
          const s = state.interpreterSubs.find(function(x){ return x.id === n.submissionId; });
          state.trayOpen = false;
          if (s) {
            setState({ interpreterReader: s });
          } else {
            updateNotifUI();
            showToast('That statement is no longer available.', true);
          }
        });
      });
    }
  }

  const clearBtn = document.getElementById('notif-clear-all');
  if (clearBtn) clearBtn.onclick = function() { state.notifications = []; updateNotifUI(); };
  const closeBtn = document.getElementById('notif-tray-close');
  if (closeBtn) closeBtn.onclick = function() { state.trayOpen = false; updateNotifUI(); };
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function parseUploadedFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(function(it){ return it.str; }).join(' ') + '\n';
    }
    return { filename: file.name, kind: 'pdf', body: text.trim() };
  } else if (ext === 'docx') {
    const buf = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: buf });
    return { filename: file.name, kind: 'docx', body: result.value.trim() };
  }
  throw new Error('Only PDF and Word (.docx) files are supported.');
}

function submissionToTxt(s) {
  const topLine = s.delegation.toUpperCase() + (agendaLabel(s.agenda_item) ? '  —  ' + agendaLabel(s.agenda_item).toUpperCase() : '  —  NO AGENDA ITEM');
  const header = [
    topLine,
    '═'.repeat(Math.max(topLine.length, 40)),
    '',
    'Subject:    ' + (s.subject || '(untitled)'),
    'Status:     ' + s.status,
    'Submitted:  ' + new Date(s.submitted_at).toLocaleString(),
    '─'.repeat(60), '',
  ].join('\n');
  return header + (s.body || '(No text)');
}
function downloadSingle(s) {
  const filename = s.delegation.replace(/[^a-z0-9]/gi,'_') + '_' + (s.agenda_item||'na').replace(/[^a-z0-9]/gi,'-') + '.txt';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([submissionToTxt(s)], { type: 'text/plain' }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
async function downloadAllZip(submissionsList, zipName) {
  if (!submissionsList.length) { showToast('Nothing to download', true); return; }
  const zip = new JSZip();
  const usedNames = {};
  submissionsList.forEach(function(s) {
    let base = s.delegation.replace(/[^a-z0-9]/gi,'_') + '_' + (s.agenda_item||'na').replace(/[^a-z0-9]/gi,'-');
    let name = base + '.txt', n = 1;
    while (usedNames[name]) { name = base + '_' + (n++) + '.txt'; }
    usedNames[name] = true;
    zip.file(name, submissionToTxt(s));
  });
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (zipName || 'statements') + '.zip';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('✓ Downloaded ' + submissionsList.length + ' statement' + (submissionsList.length===1?'':'s'));
}

function subscribeSessionRealtime(sessionId, stateKey, showNotifications) {
  if (realtimeSub) { realtimeSub.unsubscribe(); realtimeSub = null; }
  realtimeSub = db.channel('submissions:' + sessionId + ':' + stateKey)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'submissions', filter: 'session_id=eq.' + sessionId }, function(payload) {
      setState(function(s) {
        if (s[stateKey].find(function(x){ return x.id === payload.new.id; })) return s;
        if (showNotifications) addNotification('New statement: ' + payload.new.delegation + (agendaLabel(payload.new.agenda_item) ? ' — ' + agendaLabel(payload.new.agenda_item) : '') + (payload.new.subject ? '\n' + payload.new.subject : ''), payload.new.id);
        const patch = {};
        patch[stateKey] = [payload.new].concat(s[stateKey]);
        return patch;
      });
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'submissions', filter: 'session_id=eq.' + sessionId }, function(payload) {
      // Only notify when the delegate genuinely changed the content (subject/body) —
      // not when an interpreter just marked something spoken or corrected the
      // agenda item, which are routine bookkeeping actions, not new information.
      const contentChanged = payload.old && (payload.old.subject !== payload.new.subject || payload.old.body !== payload.new.body);
      if (showNotifications && contentChanged) {
        addNotification('Amended: ' + payload.new.delegation + (agendaLabel(payload.new.agenda_item) ? ' — ' + agendaLabel(payload.new.agenda_item) : '') + (payload.new.subject ? '\n' + payload.new.subject : ''), payload.new.id);
      }
      setState(function(s) {
        const patch = {};
        patch[stateKey] = s[stateKey].map(function(x){ return x.id === payload.new.id ? payload.new : x; });
        return patch;
      });
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'submissions', filter: 'session_id=eq.' + sessionId }, function(payload) {
      setState(function(s) {
        const patch = {};
        patch[stateKey] = s[stateKey].filter(function(x){ return x.id !== payload.old.id; });
        return patch;
      });
    })
    .subscribe();
}
function unsubscribeRealtime() {
  if (realtimeSub) { realtimeSub.unsubscribe(); realtimeSub = null; }
}

function bindPinInputs(selector, submitOnComplete) {
  const inputs = Array.prototype.slice.call(document.querySelectorAll(selector));
  inputs.forEach(function(inp, i) {
    inp.addEventListener('input', function() {
      inp.value = inp.value.replace(/\D/g, '').slice(0, 1);
      if (inp.value && inputs[i+1]) inputs[i+1].focus();
      if (submitOnComplete && inputs.every(function(x){ return x.value; })) submitPinEntry();
    });
    inp.addEventListener('keydown', function(e) { if (e.key === 'Backspace' && !inp.value && inputs[i-1]) inputs[i-1].focus(); });
  });
  if (inputs[0]) setTimeout(function(){ inputs[0].focus(); }, 50);
}
function getPinValue(selector) { return Array.prototype.slice.call(document.querySelectorAll(selector)).map(function(i){ return i.value; }).join(''); }

  function capturePerFileFields() {
    return state.formFiles.map(function(f) {

      const subjectInput = document.querySelector('[data-file-subject="' + f.id + '"]');

  if (fileDrop) {

    fileInput.addEventListener('change', async function(e) { if (e.target.files.length) await handleMultipleFileUpload(e.target.files, capturePerFileFields()); e.target.value = ''; });

        showToast('Enter an agenda item for every file — ' + missing.length + ' of ' + currentFiles.length + ' still missing.', true);
        setState({ formFiles: currentFiles });
        return;
      }
      let successCount = 0, failCount = 0;
      for (const f of currentFiles) {
        const result = await submitNew(state.delegation, state.pin, state.currentSession.id, {
          subject: (f.subject || '').trim() || f.filename, body: f.body, agendaItem: f.agendaItem.trim(), kind: f.kind, filename: f.filename,
        });
        if (result.success) successCount++; else failCount++;
      }
      if (failCount > 0) showToast(successCount + ' submitted, ' + failCount + ' failed — try the remaining ones again.', true);
      else showToast('✓ ' + successCount + ' statement' + (successCount===1?'':'s') + ' submitted');
      await loadDelegateDashboard();
      setState({ view: 'dashboard', formAgenda: '', formSubject: '', formFiles: [] });
      return;
    }

    const agendaItem = document.getElementById('f-agenda').value.trim();
    const subject = document.getElementById('f-subject').value.trim();
    if (!subject) { showToast('Please enter a subject.', true); return; }
    const body = document.getElementById('f-body').value.trim();
    if (!body) { showToast('Please enter the statement text.', true); return; }

    if (isEdit) {
      const result = await amendExisting(state.delegation, state.pin, state.currentSession.id, state.editingId, { subject: subject, body: body, agendaItem: agendaItem });
      if (!result.success) { showToast(result.error, true); return; }

      const result = await submitNew(state.delegation, state.pin, state.currentSession.id, { subject: subject, body: body, agendaItem: agendaItem, kind: 'text', filename: null });
      if (!result.success) { showToast(result.error, true); return; }
      showToast('✓ Statement submitted');
    }
    await loadDelegateDashboard();
    setState({ view: 'dashboard', formAgenda: '', formSubject: '', formFiles: [] });
  });
}
async function handleMultipleFileUpload(fileList, preserveFields) {
  const files = Array.prototype.slice.call(fileList);
  if (files.length === 0) return;
  showToast('Reading ' + files.length + ' file' + (files.length===1?'':'s') + '…');
  const currentFiles = (preserveFields && preserveFields.formFiles) || state.formFiles;
  const newEntries = [];
  for (const file of files) {
    try {
      const parsed = await parseUploadedFile(file);
      newEntries.push({
        id: 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
        filename: parsed.filename,
        kind: parsed.kind,
        body: parsed.body,
        agendaItem: '',
        subject: parsed.filename.replace(/\.[^.]+$/, ''),
      });
    } catch (e) {
      showToast('Could not read ' + file.name + ': ' + e.message, true);
    }
  }
  const patch = { formFiles: currentFiles.concat(newEntries) };
  if (preserveFields) { if (preserveFields.formAgenda !== undefined) patch.formAgenda = preserveFields.formAgenda; if (preserveFields.formSubject !== undefined) patch.formSubject = preserveFields.formSubject; }
  setState(patch);
}

function slugifyAgendaKey(key) {
  return 'agenda-anchor-' + key.replace(/[^0-9.]/g, '').replace(/\./g, '-');
}

function getAgendaNavItems(grouped) {
  const seen = {};
  const order = [];
  grouped.forEach(function(entry) {
    const key = entry[0];
    if (key.indexOf('—') === 0) return;
    const numMatch = key.match(/[0-9]+(?:\.[0-9]+)?/);
    if (!numMatch) return;
    const topLevel = numMatch[0].split('.')[0];
    if (!seen[topLevel]) {
      seen[topLevel] = slugifyAgendaKey(key);
      order.push(topLevel);
    }
  });
  return order.map(function(n){ return { number: n, anchorId: seen[n] }; });
}

function getInterpreterGroupedFrom(subsList, filterText) {
  const filter = (filterText || '').toLowerCase();
  let subs = subsList;
  if (filter) subs = subs.filter(function(s) { return (s.subject||'').toLowerCase().includes(filter) || (s.delegation||'').toLowerCase().includes(filter) || (s.agenda_item||'').includes(filter); });
  const map = {};
  const order = [];
  subs.forEach(function(s) {
    const items = parseAgenda(s.agenda_item);
    const keys = items.length ? items.map(function(i){ return 'Item ' + i; }) : ['— No agenda item —'];
    const ctxs = items.length ? items : [null];
    keys.forEach(function(k, idx) {
      if (!map[k]) { map[k] = []; order.push(k); }
      map[k].push({ stmt: s, ctx: ctxs[idx] });
    });
  });
  order.forEach(function(k) {
    map[k].sort(function(a, b) {
      const aDone = isItemDone(a.stmt, a.ctx), bDone = isItemDone(b.stmt, b.ctx);
      if (aDone !== bDone) return aDone ? 1 : -1;
      return a.stmt.delegation.localeCompare(b.stmt.delegation);
    });
  });
  return order.map(function(k){ return [k, map[k]]; }).sort(function(a,b) {
    const aU = a[0].indexOf('—') === 0, bU = b[0].indexOf('—') === 0;
    if (aU !== bU) return aU ? 1 : -1;
    const an = parseFloat(a[0].replace(/[^0-9.]/g,'')) || 999, bn = parseFloat(b[0].replace(/[^0-9.]/g,'')) || 999;
    return an - bn;
  });
}
function getInterpreterGrouped() {
  return getInterpreterGroupedFrom(state.interpreterSubs, state.interpreterFilter);
}

      const s = state.allSubmissions.find(function(x){ return x.id === btn.dataset.downloadAdmin; });
      if (s) downloadSingle(s);
    });
  });
  document.querySelectorAll('[data-del-sub]').forEach(function(btn) {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      if (!confirm('Remove this submission permanently?')) return;
      await db.rpc('admin_delete_submission', { p_admin_key: ADMIN_KEY, p_id: btn.dataset.delSub });
      await refreshAdmin();
    });
  });
}

function renderAdminAddSubmission(app) {
  const allNames = MEMBER_STATES.concat(ASSOCIATE_MEMBERS, ORGANIZATIONS).sort();
  app.innerHTML =
    renderHeader('admin') +
    '<main>' +
      '<div class="dash-header"><div class="dash-title">Add Submission</div><button class="btn btn-nav" id="btn-back">← Back</button></div>' +
      '<div class="form-card">' +
        '<div class="form-field"><label class="form-label">Delegation</label><select class="form-input" id="f-delegation"><option value="">Select…</option>' + allNames.map(function(n){ return '<option value="' + esc(n) + '" ' + (state.newSubDelegation===n?'selected':'') + '>' + esc(n) + '</option>'; }).join('') + '</select></div>' +
        '<div class="form-field"><label class="form-label">Agenda item</label><input class="form-input" id="f-agenda" placeholder="e.g. 5, 9, 11" value="' + esc(state.newSubAgenda || '') + '" style="max-width:200px;" /></div>' +
        '<div class="form-field"><label class="form-label">Subject</label><input class="form-input" id="f-subject" placeholder="Statement subject" value="' + esc(state.newSubSubject || '') + '" /></div>' +
        '<div class="form-field"><label class="form-label">Submission method</label><div class="method-tabs"><button class="method-tab ' + (state.newSubMethod==='text'?'active':'') + '" data-method="text">Type directly</button><button class="method-tab ' + (state.newSubMethod==='file'?'active':'') + '" data-method="file">Upload PDF / Word</button></div></div>' +
        (state.newSubMethod === 'text' ? '<div class="form-field"><label class="form-label">Statement text</label><textarea class="form-input" id="f-body" placeholder="Statement text…">' + esc(state.newSubBody || '') + '</textarea></div>' :
          '<div class="form-field"><label class="form-label">Upload file</label><div class="file-drop" id="file-drop"><div class="file-drop-icon">📄</div><div>Drop a PDF or Word file here, or click to browse</div><input type="file" id="file-input" accept=".pdf,.docx" style="display:none;" />' + (state.newSubParsedFile ? '<div class="file-name-chip">✓ ' + esc(state.newSubParsedFile.filename) + '</div>' : '') + '</div></div>') +
        '<div class="form-actions"><button class="btn" id="btn-cancel-form" style="color:#5a6478;">Cancel</button><button class="btn btn-primary" id="btn-submit-form">Add Submission</button></div>' +
      '</div>' +
    '</main>';
  document.getElementById('btn-back').addEventListener('click', function() { setState({ view: 'admin-dashboard', newSubDelegation: '', newSubAgenda: '', newSubSubject: '', newSubBody: '' }); });
  document.getElementById('btn-cancel-form').addEventListener('click', function() { setState({ view: 'admin-dashboard', newSubDelegation: '', newSubAgenda: '', newSubSubject: '', newSubBody: '' }); });
  bindLogout();
  // Capture current field values before any action that triggers a re-render
  function captureFields() {
    const d = document.getElementById('f-delegation');
    const a = document.getElementById('f-agenda');
    const s = document.getElementById('f-subject');
    const b = document.getElementById('f-body');
    return {
      newSubDelegation: d ? d.value : state.newSubDelegation,
      newSubAgenda: a ? a.value : state.newSubAgenda,
      newSubSubject: s ? s.value : state.newSubSubject,
      newSubBody: b ? b.value : state.newSubBody,
    };
  }
  document.querySelectorAll('[data-method]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const fields = captureFields();
      setState(Object.assign({ newSubMethod: btn.dataset.method, newSubParsedFile: null }, fields));
    });
  });
  const fileDrop = document.getElementById('file-drop');
  if (fileDrop) {
    const fileInput = document.getElementById('file-input');
    fileDrop.addEventListener('click', function() { fileInput.click(); });
    fileDrop.addEventListener('dragover', function(e) { e.preventDefault(); fileDrop.classList.add('drag-over'); });
    fileDrop.addEventListener('dragleave', function() { fileDrop.classList.remove('drag-over'); });
    fileDrop.addEventListener('drop', async function(e) { e.preventDefault(); fileDrop.classList.remove('drag-over'); const file = e.dataTransfer.files[0]; if (file) { const parsed = await parseUploadedFile(file); setState(Object.assign({ newSubParsedFile: parsed }, captureFields())); } });
    fileInput.addEventListener('change', async function(e) { const file = e.target.files[0]; if (file) { const parsed = await parseUploadedFile(file); setState(Object.assign({ newSubParsedFile: parsed }, captureFields())); } });
  }
  document.getElementById('btn-submit-form').addEventListener('click', async function() {
    const delegation = document.getElementById('f-delegation').value;
    const agendaItem = document.getElementById('f-agenda').value.trim();
    const subject = document.getElementById('f-subject').value.trim();
    if (!delegation) { showToast('Select a delegation.', true); return; }
    if (!subject) { showToast('Enter a subject.', true); return; }
    let body, kind, filename;
    if (state.newSubMethod === 'text') {
      body = document.getElementById('f-body').value.trim(); kind = 'text'; filename = null;
      if (!body) { showToast('Enter the statement text.', true); return; }
    } else {
      if (!state.newSubParsedFile) { showToast('Upload a file.', true); return; }
      body = state.newSubParsedFile.body; kind = state.newSubParsedFile.kind; filename = state.newSubParsedFile.filename;
    }
    const currentSess = state.adminSessions[0];
    if (!currentSess) { showToast('No active session.', true); return; }
    const result = await adminAddSubmission(ADMIN_KEY, delegation, currentSess.id, { subject: subject, body: body, agendaItem: agendaItem, kind: kind, filename: filename });
    if (!result.success) { showToast(result.error, true); return; }
    showToast('✓ Submission added');
    await refreshAdmin();
    setState({ view: 'admin-dashboard', newSubDelegation: '', newSubAgenda: '', newSubSubject: '', newSubBody: '', newSubParsedFile: null });
  });
}

function renderAdminPinResets(app) {
  const currentSess = state.adminSessions[0];
  const filter = state.pinResetFilter.toLowerCase();
  const filtered = state.registeredDelegations.filter(function(d) { return !filter || d.delegation.toLowerCase().includes(filter); });
  app.innerHTML =
    renderHeader('admin') +
    '<main>' +
      '<div class="dash-header"><div><div class="dash-title">PIN Resets</div><div class="dash-sub">' + (currentSess ? esc(currentSess.name) : '') + '</div></div><button class="btn btn-nav" id="btn-back">← Back</button></div>' +
      '<div class="form-card">' +
        '<div class="pw-text">If a delegation forgets their PIN, reset it here. This does not delete any of their submitted statements — it only clears the PIN, so they can set a new one the next time they log in. The PIN itself cannot be viewed or recovered, only reset.</div>' +
        '<input class="form-input" id="pin-reset-filter" placeholder="Search delegation…" value="' + esc(state.pinResetFilter) + '" style="margin-bottom:1rem;" />' +
        '<div class="roster-list" id="pin-reset-list" style="max-height:420px;">' +
          (filtered.length === 0 ?
            '<div style="color:#8a9ab0;padding:0.5rem 0;">' + (state.registeredDelegations.length === 0 ? 'No delegations have set a PIN for this session yet.' : 'No matches.') + '</div>' :
            filtered.map(function(d) {
              return '<div class="roster-item"><span>' + esc(d.delegation) + ' <span style="color:#8a9ab0;font-family:\'JetBrains Mono\',monospace;font-size:0.65rem;">since ' + new Date(d.created_at).toLocaleString() + '</span></span><button class="btn btn-danger btn-sm" data-reset-pin="' + esc(d.delegation) + '">🔑 Reset PIN</button></div>';
            }).join('')) +
        '</div>' +
      '</div>' +
    '</main>';
  document.getElementById('btn-back').addEventListener('click', function() { setState({ view: 'admin-dashboard' }); });
  bindLogout();
  document.getElementById('pin-reset-filter').addEventListener('input', function(e) { setState({ pinResetFilter: e.target.value }); });
  document.querySelectorAll('[data-reset-pin]').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      const delegation = btn.dataset.resetPin;
      if (!confirm('Reset the PIN for "' + delegation + '"?\n\nThey will need to set a new PIN next time they log in. Their existing statements are not affected.')) return;
      const result = await adminResetDelegationPin(ADMIN_KEY, delegation, currentSess.id);
      if (!result.success) { showToast(result.error, true); return; }
      showToast('✓ PIN reset for ' + delegation);
      const registered = await adminListRegisteredDelegations(ADMIN_KEY, currentSess.id);
      setState({ registeredDelegations: registered });
    });
  });
}

      '<div class="pw-body"><input class="form-input" type="password" id="sec-key-input" placeholder="Session password" autofocus /><div class="pw-error" id="sec-error" style="display:none;">Incorrect password</div>' +
      '<div class="pw-actions"><button class="btn" id="sec-cancel-2" style="color:#5a6478;">Cancel</button><button class="btn btn-primary" id="sec-submit">Enter</button></div></div>' +
    '</div></div>';
  const cancel = function() { setState({ view: 'login' }); };
  document.getElementById('sec-cancel').addEventListener('click', cancel);
  document.getElementById('sec-cancel-2').addEventListener('click', cancel);
  const submit = async function() {
    const pw = document.getElementById('sec-key-input').value;
    const ok = await verifyInterpreterPassword(state.currentSession.id, pw);
    if (!ok) { document.getElementById('sec-error').style.display = 'block'; return; }
    const subs = await fetchSessionSubmissions(state.currentSession.id);
    subscribeSessionRealtime(state.currentSession.id, 'secSubmissions', false);
    setState({ isSecretariat: true, secSubmissions: subs, view: 'secretariat-dashboard' });

}

  });

      if (s) setState({ secReader: s });
    });
  });
  document.querySelectorAll('[data-download-sec]').forEach(function(btn) {

      if (s) downloadSingle(s);
    });

  bindLogout();

}

async function init() {
  const currentSession = await fetchCurrentSession();
  state.currentSession = currentSession;

  const savedName = sessionStorage.getItem('delegate_name');
  const savedPin = sessionStorage.getItem('delegate_pin');
  const savedSessionId = sessionStorage.getItem('delegate_session_id');

  if (savedName && savedPin && savedSessionId && currentSession && savedSessionId === currentSession.id) {
    const result = await fetchMySubmissions(savedName, savedPin, currentSession.id);
    if (result.success) {
      state.delegation = savedName; state.pin = savedPin; state.submissions = result.submissions; state.view = 'dashboard';
    } else {
      sessionStorage.removeItem('delegate_name'); sessionStorage.removeItem('delegate_pin'); sessionStorage.removeItem('delegate_session_id');
    }
  } else if (savedSessionId && currentSession && savedSessionId !== currentSession.id) {
    sessionStorage.removeItem('delegate_name'); sessionStorage.removeItem('delegate_pin'); sessionStorage.removeItem('delegate_session_id');
  }

  render();
}

init();
