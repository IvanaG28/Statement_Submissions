function bindEvents() {
  // Bell → toggle notification tray
  document.getElementById('notif-bell-btn')?.addEventListener('click', () => {
    state.trayOpen = !state.trayOpen;
    updateNotifUI();
  });
  // Roster management
  document.getElementById('btn-roster')?.addEventListener('click', () => setState({ showRoster: true }));
  document.getElementById('roster-close')?.addEventListener('click', () => setState({ showRoster: false }));
  document.getElementById('roster-backdrop')?.addEventListener('click', e => { if (e.target.id === 'roster-backdrop') setState({ showRoster: false }); });
  const doAdd = () => {
    const input = document.getElementById('roster-add-input');
    const name = (input?.value || '').trim();
    if (!name) return;
    const roster = getRoster();
    if (roster.find(n => n.toLowerCase() === name.toLowerCase())) { showToast(`⚠ "${name}" already on roster`); return; }
    saveRoster([...roster, name]);
    if (input) input.value = '';
    setState({ showRoster: true });
    showToast(`✓ "${name}" added`);
  };
  document.getElementById('roster-add-btn')?.addEventListener('click', doAdd);
  document.getElementById('roster-add-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });
  document.querySelectorAll('.roster-item-remove[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.remove;
      if (!confirm(`Remove "${name}" from the roster?`)) return;
      saveRoster(getRoster().filter(n => n !== name));
      setState({ showRoster: true });
      showToast(`✓ "${name}" removed`);
    });
  });
  document.getElementById('roster-reset')?.addEventListener('click', () => {
    if (!confirm('Reset to the default interpreter list? All custom changes will be lost.')) return;
    localStorage.removeItem(ROSTER_LS_KEY);
    setState({ showRoster: true });
    showToast('✓ Roster reset to default');
  });

  document.getElementById('btn-logout')?.addEventListener('click', () => {
    localStorage.removeItem('imo_user');
    localStorage.removeItem('imo_session');
    if (realtimeSub) { realtimeSub.unsubscribe(); realtimeSub = null; }
    setState({ user: null, isAdmin: false, session: null, statements: [], connected: false });
  });

  // Clear all
  document.getElementById('btn-clear')?.addEventListener('click', () => {
    if (confirm(`Clear all ${state.statements.length} statements from this session?`)) deleteAllStatements();
  });

  // Session controls
  document.getElementById('btn-open-sessions')?.addEventListener('click', async () => {
    await loadSessions();
    setState({ showSessions: true });
  });
  document.getElementById('btn-change-session')?.addEventListener('click', async () => {
    await loadSessions();
    setState({ showSessions: true });
  });
  document.getElementById('session-close')?.addEventListener('click', () => setState({ showSessions: false }));
  document.getElementById('session-backdrop')?.addEventListener('click', e => { if(e.target.id==='session-backdrop') setState({ showSessions: false }); });

  // Select existing session
  document.querySelectorAll('[data-session-id]').forEach(el => {
    el.addEventListener('click', async (e) => {
      // Don't select the session if the delete button was clicked
      if (e.target.closest('.session-del-btn')) return;
      const sess = state.sessions.find(s => s.id === el.dataset.sessionId);
      if (sess) await selectSession(sess);
    });
  });

  // Delete session — removes the session AND all its statements
  document.querySelectorAll('.session-del-btn[data-del-session-id]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const sessionId = btn.dataset.delSessionId;
      const sessionName = btn.dataset.delSessionName;
      const confirmed = confirm(
        `Delete "${sessionName}"?\n\nThis will permanently remove the session and ALL its statements for everyone. This cannot be undone.`
      );
      if (!confirmed) return;
      await deleteSession(sessionId);
      setState({ showSessions: true }); // refresh the modal with updated list
      showToast(`✓ "${sessionName}" deleted`);
    });
  });

  // Create new session
  document.getElementById('btn-create-session')?.addEventListener('click', async () => {
    const name = document.getElementById('new-session-input')?.value.trim();
    if (!name) return;
    const sess = await createSession(name);
    if (sess) await selectSession(sess);
  });
  document.getElementById('new-session-input')?.addEventListener('keydown', async e => {
    if (e.key === 'Enter') document.getElementById('btn-create-session')?.click();
  });

  // Participants PDF drop zone
  const pDrop = document.getElementById('participants-drop');
  const pFile = document.getElementById('participants-file');
  if (pDrop && pFile) {
    pDrop.addEventListener('click', () => pFile.click());
    pDrop.addEventListener('dragover', e => { e.preventDefault(); pDrop.style.borderColor = '#c9a961'; });
    pDrop.addEventListener('dragleave', () => { pDrop.style.borderColor = ''; });
    pDrop.addEventListener('drop', async e => {
      e.preventDefault(); pDrop.style.borderColor = '';
      const file = e.dataTransfer.files[0];
      if (file) await loadParticipantsPdf(file);
    });
    pFile.addEventListener('change', async e => {
      const file = e.target.files[0];
      if (file) await loadParticipantsPdf(file);
    });
  }

  // Upload zone
  const zone = document.getElementById('upload-zone');
  if (zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', e => { if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', async e => {
      e.preventDefault(); zone.classList.remove('drag-over');
      const files = Array.from(e.dataTransfer.files);
      for (const f of files) await processFile(f);
    });
    document.getElementById('btn-browse')?.addEventListener('click', e => { e.stopPropagation(); document.getElementById('file-input')?.click(); });
    document.getElementById('file-input')?.addEventListener('change', async e => {
      const files = Array.from(e.target.files || []);
      for (const f of files) await processFile(f);
      e.target.value = '';
    });
  }

  // Whole-page drop (also catches drops outside the zone)
  document.body.onDragOver = e => e.preventDefault();

  // Group tabs
  document.querySelectorAll('[data-group]').forEach(btn => {
    btn.addEventListener('click', () => setState({ groupBy: btn.dataset.group }));
  });

  // Search
  document.getElementById('search-input')?.addEventListener('input', e => setState({ filter: e.target.value }));

  // Export CSV
  document.getElementById('btn-csv')?.addEventListener('click', exportCsv);

  // Cards → reader (click body area)
  document.querySelectorAll('.card[data-id]').forEach(card => {
    card.addEventListener('click', (e) => {
      // Don't open reader if edit/done/delete button was clicked
      if (e.target.closest('.card-edit-btn') || e.target.closest('.card-done-btn') || e.target.closest('.card-del-btn')) return;
      const s = state.statements.find(x => x.id === card.dataset.id);
      const itemContext = card.dataset.itemContext || null;
      if (s) setState({ reader: s, readerItemContext: itemContext });
    });
  });

  // Edit button → open edit modal
  document.querySelectorAll('.card-edit-btn[data-edit-id]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const s = state.statements.find(x => x.id === btn.dataset.editId);
      if (s) setState({ editing: s, reader: null });
    });
  });

  // Delete button → remove individual statement
  document.querySelectorAll('.card-del-btn[data-del-id]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const s = state.statements.find(x => x.id === btn.dataset.delId);
      if (!s) return;
      if (confirm(`Remove "${s.subject}"?\n\nThis will remove it from all screens.`)) {
        await deleteStatement(s.id);
      }
    });
  });

  // Done button → toggle completed
  document.querySelectorAll('.card-done-btn[data-done-id]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const s = state.statements.find(x => x.id === btn.dataset.doneId);
      if (!s) return;
      const itemContext = btn.dataset.itemContext || null;
      const newCompletedItems = toggleItemDone(s, itemContext);
      await updateStatement(s.id, { completed_items: newCompletedItems || null });
    });
  });

  // Edit modal events
  const closeEdit = () => setState({ editing: null });
  document.getElementById('edit-close')?.addEventListener('click', closeEdit);
  document.getElementById('edit-cancel')?.addEventListener('click', closeEdit);
  document.getElementById('edit-backdrop')?.addEventListener('click', e => { if (e.target.id === 'edit-backdrop') closeEdit(); });
  document.getElementById('edit-save')?.addEventListener('click', async () => {
    const s = state.editing;
    if (!s) return;
    const rawSubmitter = (document.getElementById('edit-submitter')?.value || '').trim();
    const rawAgenda = (document.getElementById('edit-agenda')?.value || '').trim();

    // Normalise agenda: split on commas/spaces, dedupe, sort numerically
    const agendaItems = [...new Set(
      rawAgenda.split(/[,\s]+/).map(x => x.trim()).filter(Boolean)
    )].sort((a, b) => parseFloat(a) - parseFloat(b));
    const agendaValue = formatAgenda(agendaItems) || null;

    // Work out whether the submitter is a known org or member state
    const isOrg = ORGANIZATIONS.some(o => o.toLowerCase() === rawSubmitter.toLowerCase());
    const patch = {
      agenda_item: agendaValue,
      member_state: isOrg ? null : (rawSubmitter || null),
      organization: isOrg ? rawSubmitter : null,
    };

    closeEdit();
    await updateStatement(s.id, patch);
  });
  document.getElementById('edit-submitter')?.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('edit-save')?.click(); if (e.key === 'Escape') closeEdit(); });
  document.getElementById('edit-agenda')?.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('edit-save')?.click(); if (e.key === 'Escape') closeEdit(); });

  // Reader close
  document.getElementById('reader-close')?.addEventListener('click', () => {
    document.body.classList.remove('modal-open');
    setState({ reader: null });
  });
  document.getElementById('reader-backdrop')?.addEventListener('click', e => {
    if (e.target.id === 'reader-backdrop') {
      document.body.classList.remove('modal-open');
      setState({ reader: null });
    }
  });

  // Prevent scroll from leaking out of modal body to the page behind
  const modalBody = document.querySelector('.modal-body');
  if (modalBody) {
    modalBody.addEventListener('wheel', e => e.stopPropagation(), { passive: true });
    modalBody.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
    document.body.classList.add('modal-open');
  }

  // Download individual statement as .txt
  document.getElementById('reader-download')?.addEventListener('click', () => {
    const s = state.reader;
    if (!s) return;
    const submitter = s.organization || s.member_state || 'Unassigned';
    const header = [
      `Subject:   ${s.subject}`,
      `Submitter: ${submitter}`,
      `Agenda:    ${agendaLabel(s.agenda_item) || '—'}`,
      `Sender:    ${s.sender}`,
      `Time:      ${new Date(s.received_at).toLocaleString()}`,
      '─'.repeat(60),
      '',
    ].join('\n');
    const content = header + (s.body || '(No text extracted)');
    const agendaPart = parseAgenda(s.agenda_item).join('-') || 'unknown';
    const filename = `${submitter.replace(/[^a-z0-9]/gi,'_')}_Item${agendaPart}.txt`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain' }));
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.body.classList.remove('modal-open');
      setState({ reader: null, editing: null, showSessions: false });
    }
  }, { once: true });

  // Password modal
  if (state.showPw) bindPwModal();
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── SESSION MANAGEMENT ──────────────────────────────────────────────────────
async function selectSession(sess) {
  localStorage.setItem('imo_session', JSON.stringify(sess));
  setState({ session: sess, showSessions: false, statements: [] });
  await loadStatements(sess.id);
  subscribeToSession(sess.id);
}

// ─── LOGIN ───────────────────────────────────────────────────────────────────
async function loginAs(name, isAdmin) {
  localStorage.setItem('imo_user', name);
  setState({ user: name, isAdmin });

  // Request browser notification permission so we can notify on other tabs
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // Try to restore last session
  const savedSession = localStorage.getItem('imo_session');
  if (savedSession) {
    try {
      const sess = JSON.parse(savedSession);
      setState({ session: sess });
      await loadStatements(sess.id);
      subscribeToSession(sess.id);
    } catch {}
  }

  // If admin, load sessions list
  if (isAdmin) await loadSessions();

  // If interpreter (read-only) and no session yet, poll until a session exists
  if (!isAdmin && !state.session) {
    pollForSession();
  }
}

async function pollForSession() {
  const { data } = await db.from('sessions').select('*').order('created_at', { ascending: false }).limit(1);
  if (data && data.length > 0) {
    await selectSession(data[0]);
  } else {
    setTimeout(pollForSession, 5000);
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

  const savedUser = localStorage.getItem('imo_user');
  if (savedUser) {
    const isAdmin = savedUser === ADMIN_USER;
    state.user = savedUser;
    state.isAdmin = isAdmin;

    const savedSession = localStorage.getItem('imo_session');
    if (savedSession) {
      try {
        const sess = JSON.parse(savedSession);
        state.session = sess;
        await loadStatements(sess.id);
        subscribeToSession(sess.id);
      } catch {}
    }
    if (isAdmin) await loadSessions();
    if (!isAdmin && !state.session) pollForSession();
  }

  render();
}
